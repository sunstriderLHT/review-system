<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo & CS 复习系统</title>
    <link rel="stylesheet" href="styles.css">

    <!-- 新增：Markdown 解析与代码高亮依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
</head>
<body>

<div class="top-nav">
    <div class="nav-container">
        <h2>Review System</h2>
        <div class="tabs">
            <div class="tab active" data-target="today" id="tab-today">📅 今日待复习</div>
            <div class="tab" data-target="kp-algo" id="tab-kp-algo">💻 算法刷题库</div>
            <div class="tab" data-target="kp-cs" id="tab-kp-cs">🖥️ 计算机基础</div>
            <div class="tab" data-target="wq-choice" id="tab-wq-choice">📝 笔试错题集</div>
        </div>
    </div>
</div>

<div class="main-container">
    <div id="stats-container" class="stats-card" style="display: none;">
        <div class="stats-header"><h3>算法练习趋势 (近 7 日)</h3></div>
        <div id="simple-chart" class="simple-chart"></div>
    </div>

    <div class="header-stats">
        <span>当前视图: <strong id="current-view-title">今日待复习</strong></span>
        <div class="stats">待办任务: <span id="due-count" class="badge">0</span></div>
    </div>

    <div class="input-card" id="form-container" style="display: none;"></div>
    <div id="filter-container" style="display: none; margin-bottom: 15px;"></div>
    <div id="list-container" class="list-container"></div>
</div>

<div class="modal-overlay" id="review-modal">
    <div class="modal" style="max-width: 700px;">
        <h2>⚔️ 巩固挑战</h2>
        <div id="review-wq-section">
            <p class="modal-sub">复习前检验相关错题：</p>
            <div class="wq-list" id="modal-wq-list"></div>
        </div>
        <div id="review-desc-section" style="margin: 15px 0; display: none;">
            <p class="modal-sub">📝 思路记录 / 本次复习感悟：</p>
            <textarea id="review-desc-input" placeholder="记录本次复习的收获、调整思路等..." style="width: 100%; min-height: 120px; padding: 10px; border: 1px solid var(--border); border-radius: 4px;"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-skip" id="btn-review-skip" onclick="app.confirmReview(false)">跳过</button>
            <button class="btn-warning" onclick="app.showReviewResult(false)">未达预期</button>
            <button class="btn-success" onclick="app.showReviewResult(true)">已完成</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="edit-modal">
    <div class="modal" style="max-width: 600px;">
        <h2>✏️ 编辑算法题</h2>
        <div class="form-grid">
            <div class="form-row">
                <input type="text" id="edit-title" placeholder="题目名称" style="flex: 1;">
            </div>
            <div class="form-row">
                <div class="tag-input-wrapper" style="flex: 1;">
                    <div id="edit-tags-container" class="tags-container"></div>
                    <input type="text" id="edit-tag-input" placeholder="输入标签 (Enter添加)" autocomplete="off">
                    <div id="edit-tag-dropdown" class="tag-dropdown"></div>
                </div>
            </div>
            <div class="form-row">
                <input type="url" id="edit-link" placeholder="题目链接" style="flex: 1;">
            </div>
            <div class="form-row">
                <textarea id="edit-desc" placeholder="算法思路 (支持 Markdown)"></textarea>
            </div>
            <div class="form-row">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="edit-perfect"> 独立完美完成
                </label>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-skip" onclick="app.closeEditModal()">取消</button>
            <button class="btn-primary" onclick="app.saveEdit()">保存</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
